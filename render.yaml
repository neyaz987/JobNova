services:
  # Backend Web Service
  - type: web
    name: jobnova-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobnova-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ALLOWED_ORIGINS
        value: "*" # You can restrict this to your frontend URL later

  # Frontend Static Site
  - type: static
    name: jobnova-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: jobnova-backend
          property: host

databases:
  - name: jobnova-db
    plan: free
